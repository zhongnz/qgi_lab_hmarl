# Agent-type ablation — freeze each agent type in turn while others learn.
# Isolates each tier's contribution to overall performance.
# Usage: python scripts/run_experiment.py configs/agent_ablation.yaml
#
# Three variants:
#   1. freeze_coordinator: coordinator uses heuristic, vessels+ports learn
#   2. freeze_vessels: vessels use nominal speed, coordinator+ports learn
#   3. freeze_ports: ports use default admission, coordinator+vessels learn
#
# Compare against full MAPPO baseline to quantify each tier's value.

name: agent_ablation
description: >-
  Freeze one agent type at a time (heuristic fallback) while others learn.
  Quantifies each tier's marginal contribution to system performance.
tags:
  - ablation
  - hierarchy
  - agent-type

env:
  num_vessels: 8
  num_ports: 5
  docks_per_port: 2
  rollout_steps: 138
  episode_mode: continuous
  forecast_source: ground_truth
  weather_enabled: true
  weather_autocorrelation: 0.7

mappo:
  lr: 0.0003
  rollout_length: 128
  num_epochs: 4
  minibatch_size: 128
  clip_eps: 0.2
  gamma: 0.99
  gae_lambda: 0.95
  hidden_dims: [64, 64]
  vessel_hidden_dims: [128, 128]
  normalize_observations: true
  normalize_rewards: true
  entropy_coeff: 0.08
  entropy_coeff_end: 0.01
  max_grad_norm: 0.5
  max_grad_norm_start: 5.0
  grad_norm_warmup_fraction: 0.1
  coordinator_use_attention: true
  use_encoded_critic: true
  vessel_use_recurrence: true

# Ablation variants (run each separately or via sweep runner)
ablation:
  variants:
    freeze_coordinator:
      heuristic_coordinator: true
      description: "Coordinator frozen (reactive heuristic), vessels+ports learn"
    freeze_vessels:
      frozen_agent_types: [vessel]
      description: "Vessels frozen (nominal speed), coordinator+ports learn"
    freeze_ports:
      frozen_agent_types: [port]
      description: "Ports frozen (default admission), coordinator+vessels learn"

num_iterations: 200
num_seeds: 3
seeds: [42, 49, 56]
eval_interval: 20
output_dir: runs/agent_ablation
tensorboard: false
console_log: true
log_every: 10
