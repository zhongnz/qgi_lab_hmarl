# Baseline experiment — standard parameters at the current 8-vessel / 5-port scale.
# Usage: python scripts/run_experiment.py configs/baseline.yaml

name: baseline
description: Standard MAPPO training with default hyper-parameters.
tags:
  - baseline
  - default

env:
  num_vessels: 8
  num_ports: 5
  docks_per_port: 2             # tightened for resource contention
  rollout_steps: 138            # rollout_length + headroom
  episode_mode: continuous
  forecast_source: ground_truth
  weather_enabled: true
  weather_autocorrelation: 0.7

mappo:
  lr: 0.0003                   # Adam learning rate
  rollout_length: 128           # increased from 64 for multi-step coordination
  num_epochs: 4                 # PPO epochs per update
  minibatch_size: 128           # samples per PPO minibatch
  clip_eps: 0.2                 # PPO clipping epsilon
  gamma: 0.99                   # discount factor
  gae_lambda: 0.95              # GAE lambda for advantage estimation
  hidden_dims: [64, 64]         # actor-critic MLP hidden layer sizes
  vessel_hidden_dims: [128, 128] # vessel gets larger network for critic capacity
  normalize_observations: true  # Welford running mean/std normalisation
  normalize_rewards: true       # reward scaling via running std
  entropy_coeff: 0.08           # entropy bonus coefficient (start)
  entropy_coeff_end: 0.01       # entropy bonus coefficient (end, linear decay)
  max_grad_norm: 0.5            # gradient clipping (target after warmup)
  max_grad_norm_start: 5.0      # gradient clipping warmup start
  grad_norm_warmup_fraction: 0.1  # fraction of training for grad norm warmup
  # Architecture defaults (now True in MAPPOConfig)
  coordinator_use_attention: true
  use_encoded_critic: true
  vessel_use_recurrence: true

num_iterations: 200             # total train iterations
num_seeds: 1                    # number of seeds (1 = single run)
eval_interval: 20               # evaluate every N iterations
output_dir: runs/baseline
tensorboard: false
console_log: true
log_every: 10                   # print training stats every N iterations
