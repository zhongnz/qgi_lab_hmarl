# Weather-enabled curriculum experiment at the current 8v/5p scale.
# Usage: python scripts/run_experiment.py configs/weather_curriculum.yaml

name: weather_curriculum
description: >
  Progressive curriculum training that ramps weather severity from
  calm to full storm conditions over four stages.
tags:
  - weather
  - curriculum
  - progressive

env:
  num_vessels: 8
  num_ports: 5
  docks_per_port: 3
  rollout_steps: 69
  episode_mode: continuous
  forecast_source: ground_truth
  weather_enabled: true
  weather_penalty_factor: 0.15
  weather_autocorrelation: 0.7

mappo:
  lr: 0.0003                   # initial Adam learning rate
  lr_end: 0.00005               # linearly anneal LR to this value
  rollout_length: 64            # steps per rollout before PPO update
  num_epochs: 4                 # PPO epochs per update
  minibatch_size: 128           # samples per PPO minibatch
  clip_eps: 0.2                 # PPO clipping epsilon
  gamma: 0.99                   # discount factor
  gae_lambda: 0.95              # GAE lambda for advantage estimation
  hidden_dims: [64, 64]         # actor-critic MLP hidden layer sizes
  vessel_hidden_dims: [128, 128] # vessel gets larger network for critic capacity
  normalize_observations: true
  normalize_rewards: true
  entropy_coeff: 0.05           # entropy bonus coefficient (start) — higher for exploration
  entropy_coeff_end: 0.002      # entropy bonus coefficient (end, linear decay)
  max_grad_norm: 0.5
  max_grad_norm_start: 5.0
  grad_norm_warmup_fraction: 0.1

curriculum_stages:              # progressive weather severity ramp
  - fraction: 0.0
    config_overrides:
      weather_enabled: false
  - fraction: 0.25
    config_overrides:
      weather_enabled: true
      weather_penalty_factor: 0.05
  - fraction: 0.50
    config_overrides:
      weather_enabled: true
      weather_penalty_factor: 0.10
  - fraction: 0.75
    config_overrides:
      weather_enabled: true
      weather_penalty_factor: 0.15

num_iterations: 300
num_seeds: 3
seeds: [42, 49, 56]
eval_interval: 25
early_stopping_patience: 40
output_dir: runs/weather_curriculum
tensorboard: false
console_log: true
log_every: 10
